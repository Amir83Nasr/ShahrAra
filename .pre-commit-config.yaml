# ────────────────────────────────────────────────────────────
# ToopSet — Pre-commit Hooks
# ────────────────────────────────────────────────────────────
# Install:  pre-commit install
# Run all:  pre-commit run --all-files
# ────────────────────────────────────────────────────────────

repos:
  # ── General cleanup ────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=50000]

  # ── Python: format + lint ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff-format
        args: [--line-length=100]
      - id: ruff
        args: [--fix, --line-length=100]

  # ── Frontend: format ──────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        language: system
        entry: bash -c 'cd frontend && args=(); for f in "$@"; do args+=("${f#frontend/}"); done; npx prettier --write --ignore-unknown "${args[@]}"' --
        files: ^frontend/.*\.(js|jsx|ts|tsx|css|json|md|mjs|mts)$

  # ── Frontend: lint ────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: bash -c 'cd frontend && args=(); for f in "$@"; do args+=("${f#frontend/}"); done; npx eslint --fix "${args[@]}"' --
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        stages: [pre-commit]
